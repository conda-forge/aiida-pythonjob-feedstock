schema_version: 1

context:
  name: aiida-pythonjob
  version: "0.5.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/aiida_pythonjob-${{ version }}.tar.gz
  sha256: 2512a8e3440124a427225188d539ee660302272d3aac2bd12722263f60cd8e82

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - node-graph >=0.6.1,<0.7.dev0
    - ase
    - python >=${{ python_min }}
    - aiida-core >=2.7.1,<3
    - cloudpickle
    - voluptuous
    - plumpy <=0.25.0

tests:
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - verdi presto --profile-name test
      - python -c "import aiida_pythonjob"

about:
  summary: Run Python functions on a remote computer.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/aiidateam/aiida-pythonjob

extra:
  recipe-maintainers:
    - jan-janssen
